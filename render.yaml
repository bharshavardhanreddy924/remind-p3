services:
  - type: web
    name: memorycare-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DB_NAME
        value: memorycare_db
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: False

