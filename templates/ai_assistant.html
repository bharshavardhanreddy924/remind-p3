{% extends 'base.html' %}

{% block title %}AI Assistant{% endblock %}

{% block content %}
<div class="ai-assistant-container">
    <div class="ai-header">
        <a href="{{ url_for('dashboard') }}" class="back-button">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1>AI Memory Assistant</h1>
    </div>
    
    <div id="chat-container" class="chat-container">
        <div id="chat-messages">
            <div class="chat-message assistant-message">
                Hello {{ user.name }}! I'm your AI memory assistant. How can I help you today?
            </div>
        </div>
    </div>
    
    <div class="quick-questions-container">
        <button class="quick-question">What's my name?</button>
        <button class="quick-question">How old am I?</button>
        <button class="quick-question">Where do I live?</button>
    </div>
    
    <div class="chat-input-fixed">
        <div class="d-flex gap-2 align-items-center">
            <input type="text" id="user-input" class="form-control" placeholder="Type your question..." style="flex: 1;">
            <button class="btn btn-primary" id="send-button" style="flex-shrink: 0;">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const chatContainer = document.getElementById('chat-container');
        
        // Quick question buttons
        document.querySelectorAll('.quick-question').forEach(button => {
            button.addEventListener('click', function() {
                const questionText = this.textContent;
                userInput.value = questionText;
                sendMessage();
            });
        });
        
        // Send button click handler
        sendButton.addEventListener('click', sendMessage);
        
        // Enter key handler
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        function sendMessage() {
            const userMessage = userInput.value.trim();
            if (userMessage === '') return;
            
            // Add user message to chat
            addMessage(userMessage, 'user');
            
            // Clear input
            userInput.value = '';
            
            // Show typing indicator
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'chat-message assistant-message typing-indicator';
            typingIndicator.textContent = 'Thinking...';
            chatMessages.appendChild(typingIndicator);
            
            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // Send request to server
            fetch('{{ url_for('ai_response') }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify({ prompt: userMessage })
            })
            .then(response => response.json())
            .then(data => {
                // Remove typing indicator
                chatMessages.removeChild(typingIndicator);
                
                // Add AI response
                addMessage(data.response, 'assistant');
            })
            .catch(error => {
                console.error('Error:', error);
                // Remove typing indicator
                chatMessages.removeChild(typingIndicator);
                
                // Add error message
                addMessage('Sorry, I encountered an error. Please try again.', 'assistant');
            });
        }
        
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${sender}-message`;
            messageDiv.textContent = text;
            
            chatMessages.appendChild(messageDiv);
            
            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    });
</script>
{% endblock %}
